<style>
  :root {

  .card-label { color: var(--color-text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

  td { padding: 10px 12px; color: var(--color-text); border-bottom: 1px solid var(--color-border-light); }
  td.num { font-family: var(--font-mono); text-align: right; }

  .footer { color: var(--color-text-muted); font-size: 11px; margin-top: 14px; }

    ];
    const fullName = s => s.last + s.first;
    const fmtDate = d => `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
    const nf = n => Highcharts.numberFormat(n, 0, '.', ',');
    const total = students.reduce((a,s)=>a+s.salary,0);
    const avg = total / students.length;
    const latest = [...students].sort((a,b)=>b.entry.localeCompare(a.entry))[0];
    document.getElementById('kpi-count').textContent = students.length;
    document.getElementById('kpi-total').textContent = nf(total);
    document.getElementById('kpi-avg').textContent = nf(avg);
    document.getElementById('kpi-latest').textContent = fmtDate(latest.entry);
    document.getElementById('kpi-latest-name').textContent = fullName(latest);
    document.getElementById('tbody').innerHTML = students.map(s => `
      <tr><td style="font-family:var(--font-mono)">${s.id}</td><td>${fullName(s)}</td><td>${fmtDate(s.entry)}</td><td class="num">${nf(s.salary)}</td><td>${s.curr}</td><td>${s.email}</td></tr>`).join('');
    const st = getComputedStyle(document.documentElement);
    const get = v => st.getPropertyValue(v).trim() || null;
    const txt = get('--color-text-secondary'), muted = get('--color-text-muted'), grid = get('--color-border-light');
    const primary = get('--color-primary'), success = get('--color-success');
    Highcharts.chart('chart-salary', {
      chart: { type: 'bar', backgroundColor: 'transparent', style: { fontFamily: get('--font-sans') } },
      title: { text: null },
      xAxis: { categories: students.map(fullName), labels: { style: { color: txt } }, lineColor: grid },
      yAxis: { title: { text: 'KRW', style: { color: muted } }, labels: { style: { color: txt }, formatter: function(){ return nf(this.value); } }, gridLineColor: grid },
      tooltip: { backgroundColor: get('--color-surface'), borderColor: get('--color-border'), style: { color: get('--color-text') }, pointFormat: '급여: <b>{point.y:,.0f} KRW</b>' },
      plotOptions: { bar: { colorByPoint: true, dataLabels: { enabled: true, formatter: function(){ return nf(this.y); }, style: { color: txt } } } },
      colors: [primary, success, get('--color-warning')],
      series: [{ name: '급여', data: students.map(s=>s.salary) }],
      legend: { enabled: false }, credits: { enabled: false },
    });
    const yearMap = {};
    students.forEach(s => { const y = s.entry.slice(0,4); yearMap[y] = (yearMap[y]||0)+1; });
    const years = Object.keys(yearMap).sort();
    Highcharts.chart('chart-entry', {
      chart: { type: 'column', backgroundColor: 'transparent', style: { fontFamily: get('--font-sans') } },
      title: { text: null },
      xAxis: { categories: years, labels: { style: { color: txt } }, lineColor: grid },
      yAxis: { title: { text: '인원', style: { color: muted } }, allowDecimals: false, labels: { style: { color: txt } }, gridLineColor: grid },
      tooltip: { backgroundColor: get('--color-surface'), borderColor: get('--color-border'), style: { color: get('--color-text') }, pointFormat: '입사: <b>{point.y}명</b>' },
      plotOptions: { column: { dataLabels: { enabled: true, style: { color: txt } }, borderRadius: 3 } },
      colors: [primary],
      series: [{ name: '입사 인원', data: years.map(y=>yearMap[y]) }],
      legend: { enabled: false }, credits: { enabled: false },
    });
  </script>


</body></html>
